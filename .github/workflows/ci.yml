name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wrapper:
    name: wrapper (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: wrapper/package-lock.json
      - name: Install
        working-directory: wrapper
        run: npm ci || npm install
      - name: Typecheck
        working-directory: wrapper
        run: npm run typecheck
      - name: Lint
        working-directory: wrapper
        run: npm run lint
      - name: Test
        working-directory: wrapper
        run: npm test -- --reporter=verbose

  app-build:
    name: app build
    needs: wrapper
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Bootstrap
        shell: bash
        run: bash ./scripts/bootstrap.sh
      - name: Build wrapper
        working-directory: wrapper
        run: npm run build
      - name: Build app (unsigned)
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: talktype-${{ matrix.os }}
          path: |
            app/dist/**/*.dmg
            app/dist/**/*.exe
            app/out/**/*
          if-no-files-found: warn
          retention-days: 7
