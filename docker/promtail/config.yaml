server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: talktype-logs
    static_configs:
      - targets: [localhost]
        labels:
          app: talktype
          source: macos-host
          __path__: /host-logs/*.log.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            ts: ts
      - labels:
          level:
      - timestamp:
          source: ts
          format: RFC3339Nano
